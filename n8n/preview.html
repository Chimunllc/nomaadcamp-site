<!--
  NOMAAD Camp · Quote PDF — local preview
  ----------------------------------------
  Open this file in a browser to see the PDF template populated with
  sample data. Useful for tweaking design before pushing to n8n.

  This file fetches `quote-template.html` and replaces variables with
  the example payload from the bottom of this script. Edit the payload
  to test different scenarios (Үндсэн / Стандарт / Премиум, different
  guest counts, etc.).

  To export a PDF:
    1. Open this file in Chrome.
    2. ⌘P → Save as PDF → "More settings" → Margins: None → Save.
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NOMAAD Quote — Preview</title>
<style>
  body { margin: 0; font-family: sans-serif; background: #E8E2D2; }
  .preview-bar {
    position: sticky; top: 0; z-index: 99;
    background: #1F2A23; color: #C8A878;
    padding: 8px 16px; font-size: 12px; letter-spacing: 1px;
  }
  .preview-bar code { color: #FFFFFF; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 2px; }
  .preview-frame {
    margin: 20px auto;
    width: 210mm;
    min-height: 297mm;
    background: #FFFFFF;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
<div class="preview-bar">
  Preview · Edit <code>SAMPLE_PAYLOAD</code> in <code>preview.html</code> to test other scenarios
</div>
<iframe id="frame" class="preview-frame" frameborder="0" style="width: 210mm; height: 297mm;"></iframe>

(async () => {
  const html = await fetch('quote-template.html').then(r => r.text());
  let out = html;
  Object.keys(SAMPLE_PAYLOAD).forEach(k => {
    out = out.split('{{' + k + '}}').join(SAMPLE_PAYLOAD[k]);

  const frame = document.getElementById('frame');
  frame.srcdoc = out;
})();
</script>
</body>
</html>
