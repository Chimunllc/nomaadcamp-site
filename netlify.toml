[functions]

  [functions.emails]
  included_files = [
    "./emails/**"
  ]

[build]
command = "node scripts/generate-manifest.js"
publish = "."

[[plugins]]
origin = "ui"
package = "@netlify/plugin-emails"
pinned_version = "1"

  [plugins.inputs]

[context]

  [context.deploy-preview]

    [context.deploy-preview.functions]

      [context.deploy-preview.functions.emails]
      included_files = [
        "./emails/**"
      ]